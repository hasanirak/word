<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة الإبداع - نسخة الهاتف الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- استدعاء 40 خطاً متنوعاً -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700&family=Jomhuria&family=Lateef&family=Reem+Kufi&family=IBM+Plex+Sans+Arabic:wght@400;700&family=Almarai:wght@400;700;800&family=Aref+Ruqaa&family=Changa:wght@400;700&family=El+Messiri:wght@400;700&family=Lalezar&family=Lemonada:wght@400;700&family=Markazi+Text:wght@400;700&family=Mirza:wght@400;700&family=Scheherazade+New:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&family=Noto+Kufi+Arabic:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&family=Qahiri&family=Rakkas&family=Mada:wght@400;700&family=Katibeh&family=Vibes&family=Arimo:wght@400;700&family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&family=Montserrat:wght@400;700&family=Playfair+Display:wght@400;900&family=Lora:wght@400;700&family=Oswald:wght@400;700&family=Raleway:wght@400;700&family=Merriweather:wght@400;700&family=Ubuntu:wght@400;700&family=PT+Sans:wght@400;700&family=Mukta:wght@400;700&family=Kanit:wght@400;700&family=Titillium+Web:wght@400;700&family=Heebo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2b579a;
            --ribbon-bg: #f3f4f7;
            --border: #d1d5db;
            --app-bg: #e5e7eb;
        }

        .theme-dark { --primary: #1e1e1e; --ribbon-bg: #2d2d2d; --border: #444; --app-bg: #121212; color: #eee; }
        .theme-gray { --primary: #444; --ribbon-bg: #eee; --border: #ccc; --app-bg: #ddd; }
        .theme-purple { --primary: #6b21a8; --ribbon-bg: #faf5ff; --border: #e9d5ff; --app-bg: #f3e8ff; }

        body {
            font-family: 'Segoe UI', 'Cairo', sans-serif;
            background-color: var(--app-bg);
            overflow: hidden;
            touch-action: manipulation;
            transition: background 0.3s ease;
        }

        .app-header { background-color: var(--primary); color: white; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; height: 50px; flex-shrink: 0; z-index: 100; }
        
        .tabs-container { 
            background-color: var(--primary); 
            display: flex; 
            padding: 0 5px; 
            gap: 2px; 
            height: 35px; 
            align-items: flex-end; 
            flex-shrink: 0; 
            overflow-x: auto;
        }
        
        .tab { padding: 5px 12px; color: white; font-size: 10px; cursor: pointer; border-radius: 6px 6px 0 0; transition: all 0.2s; white-space: nowrap; opacity: 0.8; }
        .tab.active { background-color: var(--ribbon-bg); color: var(--primary); font-weight: bold; opacity: 1; }

        .ribbon { 
            background-color: var(--ribbon-bg); 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: stretch; 
            height: 140px; 
            overflow-x: auto; 
            padding: 8px 10px; 
            user-select: none; 
            flex-shrink: 0; 
            gap: 8px;
        }
        
        .ribbon-section { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            border-left: 1px solid var(--border); 
            padding: 0 10px; 
            flex-shrink: 0; 
            justify-content: space-between;
        }
        .ribbon-section:last-child { border-left: none; }
        .ribbon-label { font-size: 9px; color: #888; margin-top: auto; padding-bottom: 2px; font-weight: bold; text-transform: uppercase; }

        .btn-large { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px; min-width: 50px; border-radius: 8px; transition: all 0.1s; color: inherit; }
        .btn-large i { width: 24px; height: 24px; color: var(--primary); }
        .btn-large span { font-size: 9px; margin-top: 4px; font-weight: bold; }

        .workspace { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; align-items: center; background-color: var(--app-bg); }
        
        /* تحسين الورقة للهاتف لتظهر كاملة A4 */
        .paper { 
            background-color: white; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 21cm; 
            min-height: 29.7cm; 
            padding: 1.5cm; 
            line-height: 1.6; 
            outline: none; 
            box-sizing: border-box; 
            position: relative; 
            transition: all 0.2s ease; 
            color: #333; 
            transform-origin: top center;
        }

        /* ميديا كويري خاصة للهاتف لضمان ظهور الـ A4 كاملة */
        @media (max-width: 768px) {
            .paper { 
                width: 95vw; 
                min-height: 134.3vw; /* نسبة الـ A4 وهي 1.414 */
                padding: 0.8cm;
                font-size: 12px;
            }
            .ribbon { height: 130px; }
            .app-header h1 { font-size: 14px; }
        }

        /* إطارات الغلاف */
        .frame-classic { border: 10px double var(--primary) !important; }
        .frame-gold { border: 8px double #b48c36 !important; }
        .frame-royal { border: 6px solid #1e40af !important; outline: 2px solid #1e40af !important; outline-offset: 4px !important; }
        .frame-ornament { border: 15px solid !important; border-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0 L100 0 L100 100 L0 100 Z' stroke='%231e40af' stroke-width='10'/%3E%3C/svg%3E") 30 round !important; }

        #logo-container img { transition: all 0.2s ease; max-width: none !important; }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* ستايل مخصص للسلايدرز على الهاتف */
        input[type=range] { height: 6px; border-radius: 5px; background: #ddd; appearance: none; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; background: var(--primary); border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body id="app-body" class="flex flex-col h-screen">

    <!-- Header -->
    <header class="app-header no-print">
        <div class="flex items-center gap-2 cursor-pointer" onclick="showHome()">
            <i data-lucide="layout-dashboard" class="w-5 h-5 text-white"></i>
            <h1 class="font-bold">منصة الإبداع</h1>
        </div>
        <div class="flex items-center gap-2">
            <select onchange="changeTheme(this.value)" class="bg-white/20 text-white text-[9px] border-none rounded px-1 py-1 outline-none">
                <option value="" class="text-black">أزرق</option>
                <option value="theme-dark" class="text-black">داكن</option>
                <option value="theme-purple" class="text-black">بنفسجي</option>
            </select>
            <div id="mode-label" class="text-[9px] font-bold bg-white/20 px-2 py-1 rounded-full uppercase">الرئيسية</div>
            <a href="https://wa.me/9647762360338" target="_blank" class="bg-green-500 p-1 rounded-full">
                <i data-lucide="message-circle" class="w-4 h-4 text-white"></i>
            </a>
        </div>
    </header>

    <!-- Tabs (Scrollable on Mobile) -->
    <div class="tabs-container no-print no-scrollbar">
        <div id="tab-home" class="tab active" onclick="showHome()">الرئيسية</div>
        <div id="tab-word" class="tab" onclick="switchMode('word')">وورد</div>
        <div id="tab-cover" class="tab" onclick="switchMode('cover')">أغلفة</div>
        <div id="tab-merge" class="tab" onclick="switchMode('pdfmerge')">دمج PDF</div>
        <div id="tab-img" class="tab" onclick="switchMode('imgtopdf')">صور ➜ PDF</div>
    </div>

    <!-- Content Area -->
    <div id="main-content" class="flex flex-col flex-1 overflow-hidden">
        
        <!-- Professional Ribbon Bar -->
        <div id="ribbon-bar" class="ribbon no-scrollbar no-print hidden">
            <!-- Clipboard -->
            <div class="ribbon-section">
                <div class="flex items-center gap-1 h-full">
                    <button onclick="exec('paste')" class="btn-large"><i data-lucide="clipboard"></i><span>لصق</span></button>
                    <div class="flex flex-col gap-1">
                        <button onclick="exec('cut')" class="text-[9px] font-bold p-1 bg-white/50 rounded">قص</button>
                        <button onclick="exec('copy')" class="text-[9px] font-bold p-1 bg-white/50 rounded">نسخ</button>
                    </div>
                </div>
                <div class="ribbon-label">الحافظة</div>
            </div>

            <!-- Font Tools (40 Fonts) -->
            <div class="ribbon-section">
                <div class="flex flex-col gap-1">
                    <div class="flex gap-1 items-center">
                        <select id="font-family-select" onchange="exec('fontName', this.value)" class="text-[10px] border border-gray-300 rounded px-1 h-6 w-24 outline-none">
                            <option value="Cairo">Cairo</option>
                            <option value="Amiri">Amiri</option>
                            <option value="Tajawal">Tajawal</option>
                            <option value="Jomhuria">Jomhuria</option>
                            <option value="Almarai">Almarai</option>
                            <option value="Reem Kufi">Reem Kufi</option>
                            <option value="Vibes">Vibes</option>
                            <option value="Roboto">Roboto</option>
                            <option value="Montserrat">Montserrat</option>
                        </select>
                        <select onchange="exec('fontSize', this.value)" class="text-[10px] border border-gray-300 rounded h-6 w-8">
                            <option value="2">10</option><option value="3">12</option><option value="4" selected>14</option><option value="5">18</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-1">
                        <button onclick="exec('bold')" class="p-1 font-bold border rounded bg-white">B</button>
                        <button onclick="exec('underline')" class="p-1 underline border rounded bg-white">U</button>
                        <input type="color" onchange="exec('foreColor', this.value)" class="w-5 h-5 border-none p-0 bg-transparent">
                        <button onclick="exec('removeFormat')" class="p-1 text-red-500"><i data-lucide="eraser" class="w-3 h-3"></i></button>
                    </div>
                </div>
                <div class="ribbon-label">تنسيق</div>
            </div>

            <!-- Cover Special Tools -->
            <div id="cover-extra-ribbon" class="ribbon-section bg-blue-50/50 hidden">
                <div class="flex flex-col gap-1 justify-center h-full">
                    <div class="flex gap-1">
                        <button onclick="insertCoverTemplate()" class="bg-indigo-600 text-white px-2 py-1 rounded text-[9px] font-bold">قالب</button>
                        <select onchange="applyFrame(this.value)" class="text-[9px] border border-indigo-200 rounded px-1 h-6 w-20 bg-white font-bold outline-none">
                            <option value="paper">بلا إطار</option>
                            <option value="paper frame-classic">جامعي</option>
                            <option value="paper frame-gold">ذهبي</option>
                            <option value="paper frame-royal">ملكي</option>
                            <option value="paper frame-ornament">زخرفي</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1 bg-white/70 p-1 rounded border border-indigo-100">
                        <div class="flex items-center gap-1"><span class="text-[7px] font-bold">الحجم:</span><input type="range" min="40" max="1000" value="100" oninput="resizeLogo(this.value)" class="w-16"></div>
                        <div class="flex items-center gap-1"><span class="text-[7px] font-bold">تحريك:</span><input type="range" min="-300" max="300" value="0" oninput="moveLogoH(this.value)" class="w-16"></div>
                        <div class="flex items-center gap-1"><span class="text-[7px] font-bold text-red-500">إزاحة:</span><input type="range" min="0" max="150" value="50" oninput="moveFrame(this.value)" class="w-16"></div>
                    </div>
                </div>
                <div class="ribbon-label">تصميم</div>
            </div>

            <!-- Actions -->
            <div class="ribbon-section">
                <div class="flex gap-2">
                    <button onclick="savePDF()" class="btn-large text-red-600"><i data-lucide="file-type-2"></i><span>PDF</span></button>
                    <button onclick="saveAsWord()" class="btn-large text-blue-800"><i data-lucide="save"></i><span>DOC</span></button>
                </div>
                <div class="ribbon-label">تصدير</div>
            </div>
        </div>

        <!-- Workspaces -->
        <div id="workspace" class="workspace hidden">
            <!-- Editor (Word & Cover) -->
            <div id="editor-container" class="w-full flex justify-center">
                <div id="editor" class="paper" contenteditable="true" spellcheck="false"></div>
            </div>

            <!-- Other tools containers (Merge, Image to PDF) -->
            <div id="merge-container" class="hidden w-full max-w-md bg-white p-5 rounded-2xl shadow-xl">
                <h3 class="text-lg font-black text-center mb-4">دمج PDF</h3>
                <input type="file" id="pdf-input" multiple accept=".pdf" class="hidden" onchange="handlePdfs(this)">
                <button onclick="document.getElementById('pdf-input').click()" class="w-full border-2 border-dashed border-blue-200 p-8 rounded-xl font-bold text-blue-600 flex flex-col items-center gap-2 mb-4">
                    <i data-lucide="plus-square"></i><span>اختر الملفات</span>
                </button>
                <div id="pdf-list" class="space-y-1 mb-4"></div>
                <button id="merge-btn" onclick="processMerge()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hidden shadow-lg">دمج الآن</button>
            </div>

            <div id="img-container" class="hidden w-full max-w-md bg-white p-5 rounded-2xl shadow-xl">
                <h3 class="text-lg font-black text-center mb-4">صور إلى PDF</h3>
                <input type="file" id="img-input" multiple accept="image/*" class="hidden" onchange="handleImages(this)">
                <button onclick="document.getElementById('img-input').click()" class="w-full border-2 border-dashed border-emerald-200 p-8 rounded-xl font-bold text-emerald-600 flex flex-col items-center gap-2 mb-4">
                    <i data-lucide="image"></i><span>اختر الصور</span>
                </button>
                <div id="img-grid" class="grid grid-cols-3 gap-2 mb-4"></div>
                <button id="img-conv-btn" onclick="convertImagesToPdf()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hidden shadow-lg">تحويل لـ PDF</button>
            </div>
        </div>

        <!-- Home View -->
        <div id="home-view" class="flex-1 flex flex-col items-center justify-center p-4 bg-slate-200 overflow-y-auto">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-black text-slate-800">منصة الإبداع للهاتف</h2>
                <p class="text-xs text-slate-500 font-medium">الأداة رقم 1 للتقارير الجامعية</p>
            </div>
            <div class="grid grid-cols-2 gap-3 w-full max-w-md px-2">
                <div onclick="switchMode('word')" class="bg-white p-5 rounded-2xl shadow shadow-blue-100 cursor-pointer text-center border-b-4 border-blue-600 active:scale-95 transition-all">
                    <i data-lucide="file-text" class="w-8 h-8 text-blue-600 mx-auto mb-2"></i>
                    <h3 class="font-black text-xs">محرر وورد</h3>
                </div>
                <div onclick="switchMode('cover')" class="bg-white p-5 rounded-2xl shadow shadow-purple-100 cursor-pointer text-center border-b-4 border-purple-600 active:scale-95 transition-all">
                    <i data-lucide="layout-template" class="w-8 h-8 text-purple-600 mx-auto mb-2"></i>
                    <h3 class="font-black text-xs">مصمم أغلفة</h3>
                </div>
                <div onclick="switchMode('pdfmerge')" class="bg-white p-5 rounded-2xl shadow shadow-orange-100 cursor-pointer text-center border-b-4 border-orange-600 active:scale-95 transition-all">
                    <i data-lucide="combine" class="w-8 h-8 text-orange-600 mx-auto mb-2"></i>
                    <h3 class="font-black text-xs">دمج PDF</h3>
                </div>
                <div onclick="switchMode('imgtopdf')" class="bg-white p-5 rounded-2xl shadow shadow-emerald-100 cursor-pointer text-center border-b-4 border-emerald-600 active:scale-95 transition-all">
                    <i data-lucide="image" class="w-8 h-8 text-emerald-600 mx-auto mb-2"></i>
                    <h3 class="font-black text-xs">صور إلى PDF</h3>
                </div>
            </div>
            <div class="mt-8 text-center text-[10px] text-slate-400 font-bold">مصمم خصيصاً للهواتف الذكية 📱</div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900/90 text-white px-6 py-2 rounded-xl text-[10px] font-bold opacity-0 transition-all z-[9999] pointer-events-none shadow-xl"></div>

    <script>
        lucide.createIcons();
        let currentMode = 'home';
        let pdfQueue = [];
        let imgQueue = [];

        function changeTheme(theme) {
            document.getElementById('app-body').className = 'flex flex-col h-screen ' + theme;
            showToast("تم تغيير الثيم");
        }

        function showHome() {
            currentMode = 'home';
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('workspace').classList.add('hidden');
            document.getElementById('ribbon-bar').classList.add('hidden');
            const label = document.getElementById('mode-label');
            if(label) label.innerText = "الرئيسية";
            updateTabs();
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('workspace').classList.remove('hidden');
            
            const ribbon = document.getElementById('ribbon-bar');
            const editor = document.getElementById('editor-container');
            const merge = document.getElementById('merge-container');
            const img = document.getElementById('img-container');
            const coverTools = document.getElementById('cover-extra-ribbon');
            const label = document.getElementById('mode-label');
            const ed = document.getElementById('editor');

            [ribbon, editor, merge, img, coverTools].forEach(el => { if(el) el.classList.add('hidden'); });

            if (mode === 'word' || mode === 'cover') {
                ribbon.classList.remove('hidden');
                editor.classList.remove('hidden');
                if(label) label.innerText = mode === 'word' ? "وورد" : "أغلفة";
                
                if(mode === 'cover') {
                    coverTools.classList.remove('hidden');
                    ed.className = "paper frame-classic";
                } else {
                    ed.className = "paper";
                }
                
                if(!ed.innerHTML || ed.innerHTML.trim() === "") ed.innerHTML = "<h1>مستند جديد</h1><p>ابدأ الكتابة هنا...</p>";
            } else if (mode === 'pdfmerge') {
                merge.classList.remove('hidden');
                if(label) label.innerText = "دمج PDF";
            } else if (mode === 'imgtopdf') {
                img.classList.remove('hidden');
                if(label) label.innerText = "صور لـ PDF";
            }
            updateTabs();
            showToast(`تم فتح ${mode}`);
        }

        function updateTabs() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const map = { home: 'tab-home', word: 'tab-word', cover: 'tab-cover', pdfmerge: 'tab-merge', imgtopdf: 'tab-img' };
            const activeTab = document.getElementById(map[currentMode]);
            if(activeTab) activeTab.classList.add('active');
        }

        function exec(cmd, val = null) { document.execCommand(cmd, false, val); document.getElementById('editor').focus(); }
        function applyFrame(cls) { document.getElementById('editor').className = cls; showToast("تم تطبيق الإطار"); }
        function moveFrame(v) { document.getElementById('editor').style.padding = (v/50) + "cm"; }
        
        function resizeLogo(s) { 
            const l = document.getElementById('university-logo'); 
            if(l) { l.style.width = s + 'px'; }
        }
        
        function moveLogoH(v) {
            const l = document.getElementById('university-logo');
            if(l) { l.style.transform = `translateX(${v}px)`; }
        }

        function triggerLogoUpload(el) {
            const i = document.createElement('input'); i.type = 'file'; i.accept = 'image/*';
            i.onchange = e => {
                const f = e.target.files[0];
                if (f) {
                    const r = new FileReader();
                    r.onload = ev => {
                        el.innerHTML = `<img id="university-logo" src="${ev.target.result}" style="width:100px; height:auto; object-fit:contain; margin:0 auto; position:relative;" />`;
                        el.style.border = 'none'; el.style.background = 'transparent';
                    };
                    r.readAsDataURL(f);
                }
            }; i.click();
        }

        function insertCoverTemplate() {
            const t = `
                <div style="text-align: center; position: relative; height: 100%; border: 0 !important; pointer-events: auto; display:flex; flex-direction:column;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; font-size: 13px; font-weight: bold; line-height: 1.5; text-align:right;">
                        <div contenteditable="true" style="flex:1;">جمهورية العراق<br />وزارة التعليم العالي<br />اسم الجامعة<br />اسم الكلية</div>
                        <div id="logo-container" onclick="triggerLogoUpload(this)" style="width: 80px; min-height: 80px; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 8px; color: #aaa; cursor: pointer; background: #fcfcfc;">انقر للشعار</div>
                    </div>
                    <div style="margin: 60px 0; flex-grow:1;">
                        <h1 contenteditable="true" style="font-size: 32px; font-weight: 900; margin-bottom: 20px;">عنوان التقرير</h1>
                        <p contenteditable="true" style="font-size: 18px; font-weight: bold; color: #444;">وصف البحث</p>
                    </div>
                    <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                        <p style="font-size: 16px; font-weight: bold;">إعداد الطالب/ة</p>
                        <p contenteditable="true" style="font-size: 24px; color: #d00; font-family: 'Amiri'; font-weight: 900;">اسم الطالب</p>
                    </div>
                    <div style="margin-top:auto; padding-top:20px; font-weight:bold; color:#888;">2024 م - Iraq</div>
                </div>`;
            document.getElementById('editor').innerHTML = t;
            showToast("تم إدراج القالب");
        }

        function handleImages(input) {
            const fs = Array.from(input.files);
            for (let f of fs) {
                const r = new FileReader();
                r.onload = e => { imgQueue.push({ data: e.target.result, type: f.type }); renderImgGrid(); };
                r.readAsDataURL(f);
            }
        }
        function renderImgGrid() {
            const g = document.getElementById('img-grid');
            g.innerHTML = imgQueue.map((im, i) => `<div class="relative"><img src="${im.data}" class="h-20 w-full object-cover rounded-lg"></div>`).join('');
            document.getElementById('img-conv-btn').classList.toggle('hidden', imgQueue.length === 0);
        }
        async function convertImagesToPdf() {
            showToast("جاري المعالجة...");
            try {
                const pdf = await PDFLib.PDFDocument.create();
                for (let iq of imgQueue) {
                    const b = Uint8Array.from(atob(iq.data.split(',')[1]), c => c.charCodeAt(0));
                    const img = iq.type === 'image/png' ? await pdf.embedPng(b) : await pdf.embedJpg(b);
                    const pg = pdf.addPage([595.28, 841.89]);
                    const { width, height } = img.scaleToFit(595, 841);
                    pg.drawImage(img, { x: (595 - width) / 2, y: (841 - height) / 2, width, height });
                }
                const bytes = await pdf.save();
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([bytes], {type:'application/pdf'})); a.download = 'images.pdf'; a.click();
                showToast("تم التحميل");
            } catch (e) { showToast("خطأ أثناء التحويل"); }
        }

        function handlePdfs(input) {
            const fs = Array.from(input.files);
            for (let f of fs) {
                const r = new FileReader();
                r.onload = e => { pdfQueue.push({ name: f.name, data: e.target.result }); renderPdfList(); };
                r.readAsArrayBuffer(f);
            }
        }
        function renderPdfList() {
            const l = document.getElementById('pdf-list');
            l.innerHTML = pdfQueue.map((p, i) => `<div class="bg-white p-2 text-[10px] border rounded-lg flex justify-between items-center"><span class="font-bold truncate max-w-[150px]">${p.name}</span><button onclick="pdfQueue.splice(${i},1);renderPdfList();" class="text-red-500">حذف</button></div>`).join('');
            document.getElementById('merge-btn').classList.toggle('hidden', pdfQueue.length < 2);
        }
        async function processMerge() {
            showToast("جاري الدمج...");
            try {
                const pdf = await PDFLib.PDFDocument.create();
                for (let pq of pdfQueue) {
                    const p = await PDFLib.PDFDocument.load(pq.data);
                    const pgs = await pdf.copyPages(p, p.getPageIndices());
                    pgs.forEach(page => pdf.addPage(page));
                }
                const bytes = await pdf.save();
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([bytes], {type:'application/pdf'})); a.download = 'merged.pdf'; a.click();
                showToast("تم الدمج");
            } catch (e) { showToast("فشل الدمج"); }
        }

        async function savePDF() {
            const el = document.getElementById('editor');
            showToast("جاري التصدير...");
            const opt = { margin: 0, filename: 'report.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            await html2pdf().set(opt).from(el).save();
            showToast("تم الحفظ");
        }

        function saveAsWord() {
            const content = document.getElementById('editor').innerHTML;
            const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40' dir='rtl'><head><meta charset='utf-8' /><style>body{font-family:'Cairo', sans-serif;} .paper{padding:1cm;}</style></head><body>";
            const bl = new Blob(['\ufeff', header + content + "</body></html>"], { type: 'application/msword' });
            const a = document.createElement("a"); a.href = URL.createObjectURL(bl); a.download = 'report.doc'; a.click();
            showToast("تم تصدير DOC");
        }

        function insertTable() {
            const r = prompt("الصفوف:", "3"); const c = prompt("الأعمدة:", "3");
            if(!r || !c) return;
            let h = "<table border='1' style='width:100%; border-collapse:collapse;'>";
            for(let i=0; i<r; i++) { h += "<tr>"; for(let j=0; j<c; j++) h += "<td style='border:1px solid #ddd; padding:4px;'>...</td>"; h += "</tr>"; }
            h += "</table><p><br /></p>";
            exec("insertHTML", h);
        }

        function showToast(m) { const t = document.getElementById('toast'); if(t){ t.innerText = m; t.style.opacity = '1'; setTimeout(() => { t.style.opacity = '0'; }, 3000); } }

        window.onload = () => { lucide.createIcons(); showHome(); };
    </script>
</body>
</html>
